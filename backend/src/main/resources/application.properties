spring.application.name=globalhistorybe
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/global_history
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.apply-json-include-for-containers=false
spring.jackson.default-property-inclusion=non_null

app.jwt.secret=GlobalHistorySecretKeyForJWT2026MustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true